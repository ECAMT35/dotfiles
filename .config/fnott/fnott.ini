# -*- conf -*-

# For documentation on these options, see `man fnott.ini`

# Global values
# output=<undefined>#
# min-width=0
max-width=300
# max-height=0
# stacking-order=bottom-up
# anchor=top-right
edge-margin-vertical=12
edge-margin-horizontal=12
notification-margin=8
# icon-theme=hicolor
# max-icon-size=32
# selection-helper=dmenu
# selection-helper-uses-null-separator=no
# play-sound=aplay ${filename}

# Default values, may be overridden in 'urgency' specific sections
# layer=top
background=14161bff

border-color=39c5bfff
border-radius=8
border-size=4

# padding-vertical=12
# padding-horizontal=12

dpi-aware=yes

# title-font=sans serif
# title-color=ffffffff
# title-format=<i>%a%A</i>

# summary-font=sans serif
# summary-color=ffffffff
# summary-format=<b>%s</b>\n

# body-font=sans serif
# body-color=ffffffff
# body-format=%b

# progress-bar-height=20
# progress-color=ffffffff
# progress-style=bar

# sound-file=
# icon=

# Timeout values are in seconds. 0 to disable
# max-timeout=0
# default-timeout=0
# idle-timeout=0

[low]
background=14161bff
border-color=d0d0d0ff
title-color=888888ff
summary-color=888888ff
body-color=ffffffff
default-timeout=5

# [normal]

[critical]
summary-color=e32636ff
border-color=960018ff
title-color=e32636ff

